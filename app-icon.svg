<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#3b4edb"/>
      <stop offset="100%" stop-color="#7254ef"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="55%"  stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <clipPath id="shape">
      <rect width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <!-- Background fill -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Inner top highlight for depth -->
  <rect width="1024" height="1024" rx="220" fill="url(#glow)"/>

  <!-- Tributary mark — scale=11, centered: x_off=292, y_off=193 -->
  <!-- viewBox source: 40×58, target: 440×638, centered in 1024×1024 -->
  <g transform="translate(292, 193) scale(11)"
     stroke="rgba(255,255,255,0.93)"
     stroke-linecap="round"
     fill="rgba(255,255,255,0.93)">

    <!-- Three source dots -->
    <circle cx="5"  cy="4" r="2"/>
    <circle cx="20" cy="4" r="2"/>
    <circle cx="35" cy="4" r="2"/>

    <!-- Left tributary -->
    <path d="M5,4 C5,22 16,32 20,40" stroke-width="1.6" fill="none"/>

    <!-- Centre tributary (straight) -->
    <path d="M20,4 L20,40" stroke-width="1.6" fill="none"/>

    <!-- Right tributary -->
    <path d="M35,4 C35,22 24,32 20,40" stroke-width="1.6" fill="none"/>

    <!-- Convergence node -->
    <circle cx="20" cy="40" r="2.8"/>

    <!-- Main stream — heavier weight -->
    <path d="M20,40 L20,56" stroke-width="2.2" fill="none"/>
  </g>
</svg>
