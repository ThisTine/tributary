name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: pnpm install

      - name: Build and bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Prepare update manifest
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BUNDLE="src-tauri/target/release/bundle/macos"

          # Locate the signature file produced by the signed build
          SIG_FILE=$(find "$BUNDLE" -name "*.sig" | head -1)
          if [ -z "$SIG_FILE" ]; then
            echo "::error::No .sig file found under $BUNDLE"
            echo "Make sure TAURI_SIGNING_PRIVATE_KEY is set in repository secrets."
            exit 1
          fi

          # Locate the tarball (name includes the version)
          TAR_FILE=$(find "$BUNDLE" -name "*.app.tar.gz" | head -1)
          TAR_NAME=$(basename "$TAR_FILE")

          SIG=$(cat "$SIG_FILE")
          DOWNLOAD_BASE="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}"

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "See the release page for full changelog.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "url": "${DOWNLOAD_BASE}/${TAR_NAME}",
                "signature": "${SIG}"
              },
              "darwin-x86_64": {
                "url": "${DOWNLOAD_BASE}/${TAR_NAME}",
                "signature": "${SIG}"
              }
            }
          }
          EOF

          echo "Manifest written:"
          cat latest.json

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Tributary ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/dmg/Tributary_*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
            latest.json
